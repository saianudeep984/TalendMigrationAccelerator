<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TMA Column Lineage</title>
<style>
:root{--bg:#0e1414;--panel:#161e1e;--line:#283434;--txt:#dfe8e6;--mut:#8aa19c;--accent:#5DCAA5;--accent2:#D85A30;--accent3:#7F77DD;}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--txt);}
header{padding:20px 24px;border-bottom:1px solid var(--line);}
h1{margin:0 0 4px;font-size:18px;font-weight:500;}
header p{margin:0;color:var(--mut);font-size:13px;}
.tabs{display:flex;gap:8px;padding:12px 24px 0;border-bottom:1px solid var(--line);}
.tab{padding:8px 14px;font-size:13px;cursor:pointer;color:var(--mut);border-bottom:2px solid transparent;}
.tab.active{color:var(--accent);border-color:var(--accent);}
.panel{display:none;padding:18px 24px;}
.panel.active{display:block;}
.controls{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
input[type=text]{background:var(--panel);border:1px solid var(--line);color:var(--txt);padding:8px 10px;border-radius:6px;font-size:13px;flex:1;min-width:200px;}
select{background:var(--panel);border:1px solid var(--line);color:var(--txt);padding:8px 10px;border-radius:6px;font-size:13px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:left;padding:8px 10px;background:var(--panel);color:var(--mut);font-weight:500;position:sticky;top:0;border-bottom:1px solid var(--line);cursor:pointer;}
td{padding:7px 10px;border-bottom:1px solid var(--line);vertical-align:top;}
tr:hover td{background:#1a2424;}
.tbl-wrap{max-height:560px;overflow:auto;border:1px solid var(--line);border-radius:8px;}
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;}
.b-direct{background:#0F6E56;color:#E1F5EE;}
.b-expr{background:#993C1D;color:#FAECE7;}
.b-join{background:#534AB7;color:#EEEDFE;}
.b-ctx{background:#854F0B;color:#FAEEDA;}
.count{color:var(--mut);font-size:12px;margin-bottom:8px;}
code{font-family:ui-monospace,monospace;font-size:11px;color:var(--mut);}
#graph-wrap{border:1px solid var(--line);border-radius:8px;overflow:auto;max-height:640px;background:var(--panel);}
.gnode{cursor:pointer;}
.gnode rect{stroke-width:1;}
.gnode text{font-size:10px;fill:var(--txt);}
.glabel{font-size:9px;fill:var(--mut);}
.glink{stroke:var(--line);stroke-width:1;fill:none;}
.glink.hi{stroke:var(--accent);stroke-width:1.6;}
.legend{display:flex;gap:14px;padding:10px 0 0;font-size:11px;color:var(--mut);}
.dot{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;vertical-align:middle;}
</style>
</head>
<body>
<header>
<h1>TMA Column Lineage Architecture</h1>
<p>Source Column &rarr; Transformation &rarr; Target Column &middot; 193 mappings &middot; 3 jobs &middot; generated via lineage_graph_builder.py</p>
</header>
<div class="tabs">
<div class="tab active" data-tab="table">Searchable Table</div>
<div class="tab" data-tab="graph">Interactive Graph</div>
</div>

<div class="panel active" id="panel-table">
<div class="controls">
<input type="text" id="search" placeholder="Search column, table, component, expression...">
<select id="jobFilter"><option value="">All jobs</option></select>
<select id="ruleFilter"><option value="">All rules</option></select>
</div>
<div class="count" id="count"></div>
<div class="tbl-wrap">
<table id="tbl">
<thead><tr>
<th data-k="job">Job</th><th data-k="source_table">Source Table</th><th data-k="source_column">Source Column</th>
<th data-k="component">Transformation</th><th data-k="rule">Rule</th><th data-k="target_table">Target Table</th><th data-k="target_column">Target Column</th>
</tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>
</div>

<div class="panel" id="panel-graph">
<div class="controls">
<select id="graphJob"></select>
<input type="text" id="graphSearch" placeholder="Highlight column...">
</div>
<div class="legend">
<span><span class="dot" style="background:#5DCAA5"></span>Source column</span>
<span><span class="dot" style="background:#7F77DD"></span>Transformation</span>
<span><span class="dot" style="background:#D85A30"></span>Target column</span>
</div>
<div id="graph-wrap"><svg id="svg" width="100%"></svg></div>
</div>

function ruleClass(r){
  if(/Direct/.test(r)) return 'b-direct';
  if(/Context/.test(r)) return 'b-ctx';
  if(/Join|Lookup/.test(r)) return 'b-join';
  return 'b-expr';
}

const jobs = [...new Set(ROWS.map(r=>r.job))];
const rules = [...new Set(ROWS.map(r=>r.rule))];
const jf = document.getElementById('jobFilter');
jobs.forEach(j=>jf.innerHTML += `<option value="${j}">${j}</option>`);
const rf = document.getElementById('ruleFilter');
rules.forEach(r=>rf.innerHTML += `<option value="${r}">${r}</option>`);
const gj = document.getElementById('graphJob');
jobs.forEach(j=>gj.innerHTML += `<option value="${j}">${j}</option>`);

let sortKey=null, sortDir=1;
function renderTable(){
  const q = document.getElementById('search').value.toLowerCase();
  const jv = jf.value, rv = rf.value;
  let data = ROWS.filter(r=>{
    if(jv && r.job!==jv) return false;
    if(rv && r.rule!==rv) return false;
    if(!q) return true;
    return (r.source_column+r.target_column+r.component+r.source_table+r.target_table+r.expression+r.job).toLowerCase().includes(q);
  });
  if(sortKey) data.sort((a,b)=> (a[sortKey]>b[sortKey]?1:-1)*sortDir);
  document.getElementById('count').textContent = data.length + ' mappings';
  document.getElementById('tbody').innerHTML = data.map(r=>`<tr>
    <td>${r.job}</td><td><code>${r.source_table}</code></td><td>${r.source_column}</td>
    <td><code>${r.component}</code></td><td><span class="badge ${ruleClass(r.rule)}">${r.rule}</span></td>
    <td><code>${r.target_table}</code></td><td>${r.target_column}</td>
  </tr>`).join('');
}
document.getElementById('search').addEventListener('input', renderTable);
jf.addEventListener('change', renderTable);
rf.addEventListener('change', renderTable);
document.querySelectorAll('#tbl th').forEach(th=>th.addEventListener('click',()=>{
  const k = th.dataset.k; sortDir = (sortKey===k)? -sortDir : 1; sortKey=k; renderTable();
}));
renderTable();

// Tabs
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  document.getElementById('panel-'+t.dataset.tab).classList.add('active');
  if(t.dataset.tab==='graph') renderGraph();
}));

// Graph
function renderGraph(){
  const job = gj.value || jobs[0];
  gj.value = job;
  const data = ROWS.filter(r=>r.job===job);
  const srcCols = [...new Set(data.map(r=>r.source_table+'.'+r.source_column))];
  const comps = [...new Set(data.map(r=>r.component))];
  const tgtCols = [...new Set(data.map(r=>r.target_table+'.'+r.target_column))];

  const colW = 200, rowH = 20, pad = 40, colGap = 220;
  const maxRows = Math.max(srcCols.length, comps.length, tgtCols.length);
  const H = pad*2 + maxRows*rowH;
  const W = pad*2 + colGap*2 + colW;
  const svg = document.getElementById('svg');
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('height', H);

  const xSrc=pad, xComp=pad+colGap, xTgt=pad+colGap*2;
  const posSrc={}, posComp={}, posTgt={};
  srcCols.forEach((c,i)=>posSrc[c]=pad+i*rowH+10);
  comps.forEach((c,i)=>posComp[c]=pad+i*rowH+10);
  tgtCols.forEach((c,i)=>posTgt[c]=pad+i*rowH+10);

  let s='';
  data.forEach(r=>{
    const sKey=r.source_table+'.'+r.source_column, tKey=r.target_table+'.'+r.target_column;
    const y1=posSrc[sKey], y2=posComp[r.component], y3=posTgt[tKey];
    s+=`<path class="glink" d="M${xSrc+colW} ${y1} C ${xSrc+colW+60} ${y1} ${xComp-60} ${y2} ${xComp} ${y2}"/>`;
    s+=`<path class="glink" d="M${xComp+colW} ${y2} C ${xComp+colW+60} ${y2} ${xTgt-60} ${y3} ${xTgt} ${y3}"/>`;
  });
  srcCols.forEach(c=>{const y=posSrc[c]; s+=`<g class="gnode"><rect x="${xSrc}" y="${y-9}" width="${colW}" height="16" rx="3" fill="#0F6E56" opacity="0.25" stroke="#5DCAA5"/><text x="${xSrc+6}" y="${y+3}">${c.length>30?c.slice(0,30)+'…':c}</text></g>`;});
  comps.forEach(c=>{const y=posComp[c]; s+=`<g class="gnode"><rect x="${xComp}" y="${y-9}" width="${colW}" height="16" rx="3" fill="#534AB7" opacity="0.3" stroke="#7F77DD"/><text x="${xComp+6}" y="${y+3}">${c}</text></g>`;});
  tgtCols.forEach(c=>{const y=posTgt[c]; s+=`<g class="gnode"><rect x="${xTgt}" y="${y-9}" width="${colW}" height="16" rx="3" fill="#993C1D" opacity="0.25" stroke="#D85A30"/><text x="${xTgt+6}" y="${y+3}">${c.length>30?c.slice(0,30)+'…':c}</text></g>`;});
  svg.innerHTML = s;
}
gj.addEventListener('change', renderGraph);
document.getElementById('graphSearch').addEventListener('input', e=>{
  const q = e.target.value.toLowerCase();
  document.querySelectorAll('#svg .gnode').forEach(g=>{
    const txt = g.querySelector('text').textContent.toLowerCase();
    g.style.opacity = (!q || txt.includes(q)) ? 1 : 0.15;
  });
});
</script>
